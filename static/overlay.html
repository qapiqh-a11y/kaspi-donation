<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/overlay.css">
</head>
<body>

<div id="alertBox">
    <div id="alertFrame">
        <img id="gif" alt="Donation effect">
        <div id="amountRow">
            <div id="amount"></div>
            <div id="currencyBadge"></div>
        </div>
        <div id="name"></div>
        <div id="message"></div>
    </div>

    <audio id="donateSound"></audio>
    <audio id="ttsSound"></audio>
</div>

<script>
const alertBox = document.getElementById("alertBox");
const gifNode = document.getElementById("gif");
const amountNode = document.getElementById("amount");
const currencyBadgeNode = document.getElementById("currencyBadge");
const nameNode = document.getElementById("name");
const messageNode = document.getElementById("message");
const donateSound = document.getElementById("donateSound");
const ttsSound = document.getElementById("ttsSound");

const seenEventIds = new Set();
const alertQueue = [];
const MAX_ALERT_DURATION_MS = 30000;
const DONATE_EVENT_TTL_MS = 120000;

let isAlertActive = false;
let finishTimeout = null;

function getAmountParts(rawAmount) {
    const trimmed = String(rawAmount || "").trim();
    const match = trimmed.match(/^([\d\s.,]+)\s*(.*)$/u);

    if (!match) {
        return { value: trimmed, currency: "" };
    }

    return {
        value: match[1].trim(),
        currency: normalizeCurrency(match[2].trim())
    };
}

function normalizeCurrency(currency) {
    const upperCurrency = currency.replace(/\s+/g, "").toUpperCase();

    if (!upperCurrency) {
        return "";
    }

    if (["₸", "KZT", "ТГ", "ТЕНГЕ"].includes(upperCurrency)) {
        return "₸";
    }

    return currency;
}

function getDonateEventId(data) {
    if (!data || typeof data !== "object") {
        return "";
    }

    const eventId = String(data.id || data.tts || "").trim();
    if (!eventId || !data.amount || !data.gif || !data.sound) {
        return "";
    }

    if (data.created_at && Date.now() - Number(data.created_at) > DONATE_EVENT_TTL_MS) {
        return "";
    }

    return eventId;
}

function rememberEventId(eventId) {
    seenEventIds.add(eventId);

    if (seenEventIds.size > 50) {
        seenEventIds.delete(seenEventIds.values().next().value);
    }
}

function enqueueAlert(data) {
    alertQueue.push(data);

    if (!isAlertActive) {
        playNextAlert();
    }
}

function playNextAlert() {
    const nextAlert = alertQueue.shift();

    if (!nextAlert) {
        isAlertActive = false;
        return;
    }

    isAlertActive = true;
    showAlert(nextAlert);
}

async function checkDonate() {
    try {
        const response = await fetch("/last", { cache: "no-store" });
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const eventId = getDonateEventId(data);

        if (!eventId || seenEventIds.has(eventId)) {
            return;
        }

        rememberEventId(eventId);
        enqueueAlert(data);
    } catch (error) {
        console.error("OVERLAY UPDATE ERROR", error);
    }
}

function showAlert(data) {
    if (finishTimeout) {
        clearTimeout(finishTimeout);
    }

    donateSound.onended = null;
    ttsSound.onended = null;
    donateSound.pause();
    ttsSound.pause();
    donateSound.currentTime = 0;
    ttsSound.currentTime = 0;

    const amountParts = getAmountParts(data.amount);

    amountNode.textContent = `+ ${amountParts.value || data.amount || ""}`;
    currencyBadgeNode.textContent = amountParts.currency;
    currencyBadgeNode.classList.toggle("is-hidden", !amountParts.currency);
    currencyBadgeNode.dataset.currency = amountParts.currency || "none";

    nameNode.textContent = data.name ? `От: ${data.name}` : "От: Аноним";
    messageNode.textContent = data.message || "СПАСИБО ЗА ПОДДЕРЖКУ";
    messageNode.classList.toggle("is-empty", !data.message);

    gifNode.src = `/media/${encodeURI(data.gif)}`;
    gifNode.style.display = data.gif ? "block" : "none";

    const ttsAudioSource = data.tts_data_url || (data.tts ? `/media/${encodeURI(data.tts)}` : "");

    donateSound.src = `/media/${encodeURI(data.sound)}`;
    if (ttsAudioSource) {
        ttsSound.src = ttsAudioSource;
    } else {
        ttsSound.removeAttribute("src");
    }

    alertBox.classList.remove("show");
    void alertBox.offsetWidth;
    alertBox.classList.add("show");

    const playTtsOrFinish = () => {
        if (ttsAudioSource) {
            ttsSound.play().catch(finishAlert);
            return;
        }

        finishAlert();
    };

    donateSound.onended = playTtsOrFinish;
    ttsSound.onended = ttsAudioSource ? finishAlert : null;
    donateSound.play().catch(playTtsOrFinish);
    finishTimeout = setTimeout(finishAlert, MAX_ALERT_DURATION_MS);
}

function finishAlert() {
    if (finishTimeout) {
        clearTimeout(finishTimeout);
        finishTimeout = null;
    }

    alertBox.classList.remove("show");
    donateSound.onended = null;
    ttsSound.onended = null;

    setTimeout(playNextAlert, 400);
}

checkDonate();
setInterval(checkDonate, 1500);
</script>

</body>
</html>
